prometheus:
  url: "http://localhost:9090"
  poll_interval_seconds: 30
  anomaly_rules:
    - name: "High CPU Usage"
      query: 'system_cpu_usage > 0.50'
      severity: "warning"

    - name: "High Process CPU"
      query: 'process_cpu_usage > 0.50'
      severity: "warning"

    - name: "High JVM Heap Usage"
      query: 'jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85'
      severity: "warning"

    - name: "HTTP 5xx Error Rate"
      query: 'rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05'
      severity: "critical"

    - name: "Email Messages Failed"
      query: 'increase(email_messages_failed_total[5m]) > 0'
      severity: "critical"

    - name: "SMS Messages Failed"
      query: 'increase(sms_messages_failed_total[5m]) > 0'
      severity: "critical"

    - name: "Push Messages Failed"
      query: 'increase(push_messages_failed_total[5m]) > 0'
      severity: "critical"

    - name: "Email DLQ Messages"
      query: 'increase(email_messages_dlq_total[5m]) > 0'
      severity: "critical"

    - name: "SMS DLQ Messages"
      query: 'increase(sms_messages_dlq_total[5m]) > 0'
      severity: "critical"

    - name: "Push DLQ Messages"
      query: 'increase(push_messages_dlq_total[5m]) > 0'
      severity: "critical"

    - name: "Kafka Consumer Lag High"
      query: 'kafka_consumer_fetch_manager_records_lag_max > 1000'
      severity: "warning"

    - name: "Slow HTTP Requests"
      query: 'http_server_requests_seconds_max > 5'
      severity: "warning"

    - name: "Database Connection Pool Exhausted"
      query: 'hikaricp_connections_pending > 5'
      severity: "critical"

    - name: "Slow Kafka Listener"
      query: 'spring_kafka_listener_seconds_max > 10'
      severity: "warning"

postgres:
  host: "localhost"
  port: 5432
  database: "notifications"
  user: "notif_user"
  slow_query_threshold_ms: 500

kafka:
  bootstrap_servers: "localhost:9092"
  enabled: true
  consumer_lag_threshold: 1000

docker:
  safe_containers:
    - "notification-service"
    - "email-worker"
    - "sms-worker"
    - "push-worker"
  socket_url: "unix:///var/run/docker.sock"

claude_model: "claude-sonnet-4-6"
max_tool_iterations: 10
investigation_timeout_seconds: 120
