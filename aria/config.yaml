prometheus:
  url: "http://localhost:9090"
  poll_interval_seconds: 30
  anomaly_rules:
    - name: "High CPU"
      query: '100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80'
      severity: "warning"
    - name: "High JVM Heap"
      query: 'jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.85'
      severity: "warning"
    - name: "High Error Rate"
      query: 'rate(http_server_requests_seconds_count{status=~"5.."}[5m]) > 0.05'
      severity: "critical"
    - name: "Notification Processing Errors"
      query: 'increase(notification_processed_total{status="failed"}[5m]) > 0'
      severity: "warning"

postgres:
  host: "localhost"
  port: 5432
  database: "notifications"
  user: "notif_user"
  slow_query_threshold_ms: 500

kafka:
  bootstrap_servers: "localhost:9092"
  enabled: true
  consumer_lag_threshold: 1000

docker:
  safe_containers:
    - "notification-service"
    - "email-worker"
    - "sms-worker"
    - "push-worker"
  socket_url: "unix:///var/run/docker.sock"

claude_model: "claude-sonnet-4-6"
max_tool_iterations: 10
investigation_timeout_seconds: 120
